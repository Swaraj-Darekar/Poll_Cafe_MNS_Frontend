name: Keep-Alive
on:
  schedule:
    # Run every 10 minutes (to beat Render's 15-min sleep policy)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          # Replace with your actual Render/Vercel backend URL
          # or use a GitHub Secret named BACKEND_URL
          URL="${{ secrets.BACKEND_URL }}"
          if [ -z "$URL" ]; then
            echo "BACKEND_URL secret not set. Please add it to your repo secrets."
            exit 1
          fi
          echo "Pinging $URL/api/health..."
          curl -s -f "$URL/api/health" || exit 1
          echo "Success!"
